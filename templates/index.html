<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>CyberVault Pro | Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>.tab-content { display: none; } .active-tab { display: block; }</style>
</head>
<body class="bg-gray-900 text-gray-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-72 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="p-6 border-b border-gray-700 text-2xl font-bold text-blue-500">
            <i class="fas fa-shield-virus mr-2"></i>CyberVault Pro
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="showTab('forensics')" class="w-full text-left p-3 rounded hover:bg-gray-700"><i class="fas fa-camera mr-2"></i> Metadata Extractor</button>
            <button onclick="showTab('ssl')" class="w-full text-left p-3 rounded hover:bg-gray-700"><i class="fas fa-lock mr-2"></i> SSL Checker</button>
            <button onclick="showTab('crypto')" class="w-full text-left p-3 rounded hover:bg-gray-700"><i class="fas fa-file-shield mr-2"></i> Encrypt/Decrypt</button>
            <button onclick="showTab('watermark')" class="w-full text-left p-3 rounded hover:bg-gray-700"><i class="fas fa-copyright mr-2"></i> Watermark</button>
            <button onclick="showTab('deepfake')" class="w-full text-left p-3 rounded hover:bg-gray-700"><i class="fas fa-user-secret mr-2"></i> Deepfake Detector</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-gray-900">
        
        <div id="forensics" class="tab-content active-tab">
            <h2 class="text-3xl font-bold mb-4 text-blue-400">Advanced Metadata Extractor</h2>
            <div class="bg-gray-800 p-6 rounded shadow border border-gray-700 w-full">
                <form onsubmit="submitForm(event, '/api/forensics', 'forensicResult')">
                    <input type="file" name="file" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <button type="submit" class="bg-blue-500 px-6 py-2 rounded font-bold w-full">Deep Extract Data</button>
                </form>
                <div id="forensicResult" class="mt-4 text-sm text-green-300 bg-black p-4 rounded hidden overflow-x-auto"></div>
            </div>
        </div>

        <div id="ssl" class="tab-content">
            <h2 class="text-3xl font-bold mb-4 text-green-400">SSL Certificate Checker</h2>
            <div class="bg-gray-800 p-6 rounded shadow max-w-2xl border border-gray-700">
                <form onsubmit="submitForm(event, '/api/ssl_check', 'sslResult')">
                    <input type="text" name="hostname" placeholder="google.com" class="w-full bg-gray-700 p-3 rounded mb-4" required>
                    <button type="submit" class="bg-green-500 px-6 py-2 rounded font-bold w-full">Analyze SSL</button>
                </form>
                <div id="sslResult" class="mt-4 hidden"></div>
            </div>
        </div>

        <div id="crypto" class="tab-content">
            <h2 class="text-3xl font-bold mb-4 text-red-400">File Encrypt / Decrypt</h2>
            <div class="bg-gray-800 p-6 rounded shadow max-w-2xl border border-gray-700">
                <form onsubmit="submitForm(event, '/api/crypto', 'cryptoResult')">
                    <input type="file" name="file" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <input type="password" name="password" placeholder="Secret Key (Password)" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <select name="action" class="w-full bg-gray-700 p-2 rounded mb-4">
                        <option value="encrypt">Encrypt (Lock)</option>
                        <option value="decrypt">Decrypt (Unlock)</option>
                    </select>
                    <button type="submit" class="bg-red-500 px-6 py-2 rounded font-bold w-full">Process File</button>
                </form>
                <div id="cryptoResult" class="mt-4 hidden"></div>
            </div>
        </div>

        <div id="watermark" class="tab-content">
            <h2 class="text-3xl font-bold mb-4 text-purple-400">Digital Watermarking</h2>
            <div class="bg-gray-800 p-6 rounded shadow max-w-2xl border border-gray-700">
                <form onsubmit="submitForm(event, '/api/watermark', 'watermarkResult')">
                    <input type="file" name="image" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <input type="text" name="text" placeholder="Watermark Text" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <button type="submit" class="bg-purple-500 px-6 py-2 rounded font-bold w-full">Apply Watermark</button>
                </form>
                <div id="watermarkResult" class="mt-4 hidden"></div>
            </div>
        </div>

        <div id="deepfake" class="tab-content">
            <h2 class="text-3xl font-bold mb-4 text-pink-400">Deepfake Detection</h2>
            <div class="bg-gray-800 p-6 rounded shadow border border-gray-700 w-full">
                <form onsubmit="submitForm(event, '/api/deepfake', 'deepfakeResult')">
                    <input type="file" name="image" class="w-full bg-gray-700 p-2 rounded mb-4" required>
                    <button type="submit" class="bg-pink-500 px-6 py-2 rounded font-bold w-full">Run Analysis</button>
                </form>
                <div id="deepfakeResult" class="mt-4 text-sm text-pink-300 bg-black p-4 rounded hidden break-words"></div>
            </div>
        </div>
    </main>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
        }

        async function submitForm(e, url, resultId) {
            e.preventDefault();
            const resDiv = document.getElementById(resultId);
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = `<span class="text-yellow-400">Processing... please wait.</span>`;

            const formData = new FormData(e.target);
            try {
                const res = await fetch(url, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (url === '/api/ssl_check' && data.status === "success") {
                    resDiv.innerHTML = `<div class="p-4 bg-gray-900 border border-green-500">Security Grade: ${data.SECURITY_GRADE}<br>Domain: ${data.DOMAIN}</div>`;
                } else if (data.download_link) {
                    resDiv.innerHTML = `<a href="${data.download_link}" download class="text-green-400 font-bold underline">Download Processed File</a>`;
                } else {
                    resDiv.innerHTML = `<pre class="text-xs">${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                resDiv.innerHTML = `<span class="text-red-500">Server Error.</span>`;
            }
        }
    </script>
</body>
</html>
